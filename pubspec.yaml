name: project_fatiha
description: Project Fatiha

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.15.0 <3.0.0"
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.4
  salomon_bottom_bar: ^3.2.0
  provider: ^6.0.2
  sqflite: ^2.0.2
  timeline_tile: ^2.0.0
  path_provider: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.4

flutter:

  uses-material-design: true

  assets:
    - assets/database/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu.ttf
    - family: Gilroy
      fonts:
        - asset: assets/fonts/GilroyMedium.ttf
        - asset: assets/fonts/GilroyRegular.ttf
    - family: UthmanicRegular
      fonts:
        - asset: assets/fonts/UthmanicRegular.ttf
